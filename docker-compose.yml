services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: doma
      POSTGRES_USER: doma
      POSTGRES_PASSWORD: ${DB_PASSWORD:-doma}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U doma"]
      interval: 5s
      timeout: 5s
      retries: 5

  python-ai:
    build:
      context: ./ai
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    ports:
      - "8000:8000"

  node-scraper:
    build:
      context: ./server
    ports:
      - "3001:3001"
    environment:
      SPRING_SERVICE_URL: http://spring-server:8080
    volumes:
      - ./client:/app/client:ro
      - snapshots:/app/snapshots
    depends_on:
      postgres:
        condition: service_healthy

  spring-server:
    build:
      context: ./spring-server
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/doma
      DB_USER: doma
      DB_PASSWORD: ${DB_PASSWORD:-doma}
      SCRAPER_SERVICE_URL: http://node-scraper:3001
      PYTHON_API_URL: http://python-ai:8000
      DOMA_API_TOKEN: ${DOMA_API_TOKEN:-}
    depends_on:
      postgres:
        condition: service_healthy
      node-scraper:
        condition: service_started
      python-ai:
        condition: service_started


volumes:
  postgres_data:
  snapshots:

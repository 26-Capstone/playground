server {
    listen 80;

    # 프론트엔드 정적 파일
    root /usr/share/nginx/html;
    index DOMA.html;

    location / {
        try_files $uri $uri/ /DOMA.html;
    }

    # Spring Boot — REST API
    location /api/ {
        proxy_pass             http://spring-server:8080;
        proxy_set_header       Host $host;
        proxy_set_header       X-Real-IP $remote_addr;
        proxy_read_timeout     180s;
        proxy_connect_timeout  10s;
        proxy_send_timeout     180s;
    }

    # Spring Boot — 클라이언트 직접 호출 경로
    location /fetch-html {
        proxy_pass         http://spring-server:8080;
        proxy_set_header   Host $host;
    }

    location /heal {
        proxy_pass         http://spring-server:8080;
        proxy_set_header   Host $host;
    }

    # Node.js — WebSocket 원격 브라우저 (클라이언트가 ws://localhost:3001 직접 연결하므로 여기선 불필요)
    # docker-compose에서 3001 포트 직접 노출
}

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/doma}
    username: ${DB_USER:doma}
    password: ${DB_PASSWORD:doma}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

server:
  port: ${PORT:8080}

doma:
  scraper-service-url: ${SCRAPER_SERVICE_URL:http://localhost:3001}
  python-api-url: ${PYTHON_API_URL:http://localhost:8000}
  api-token: ${DOMA_API_TOKEN:}

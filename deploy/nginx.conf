server {
    listen 80;
    server_name doma.io.kr www.doma.io.kr;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name doma.io.kr www.doma.io.kr;

    ssl_certificate     /etc/letsencrypt/live/doma.io.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/doma.io.kr/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # 10m이었으나 /heal 요청이 페이지 스냅샷(v1_html+v2_html) 2장을 통째로 보내면서
    # 종종 이 한도를 넘겨 nginx가 413 HTML 에러 페이지를 반환 → 프론트가 JSON.parse
    # 실패로 오인하는 문제가 있어 상향.
    client_max_body_size 50m;

    location / {
        proxy_pass         http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 180s;
    }
}

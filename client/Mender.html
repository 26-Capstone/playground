<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mender — Self-healing crawler infrastructure</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ─── Light (default) ─── Toss/Notion warm whites & friendly cobalt */
    :root, [data-theme="light"]{
      --bg-1:#FCFBF8;            /* page */
      --bg-2:#FFFFFF;            /* cards */
      --bg-3:#F4F2EC;            /* subtle fill / inputs */
      --bg-4:#EDEAE1;            /* heavy fill */
      --surface-hover:#F7F5EF;
      --sidebar-bg:#F7F5EF;

      --border:rgba(20,18,12,0.07);
      --border-mid:rgba(20,18,12,0.10);
      --border-strong:rgba(20,18,12,0.16);

      --text:#1A1A1F;
      --text-mute:#62646A;
      --text-dim:#9CA0A8;
      --text-faint:#C4C7CD;

      --accent:#3182F6;          /* Toss blue */
      --accent-hover:#1B6FE5;
      --accent-soft:rgba(49,130,246,0.10);
      --accent-line:rgba(49,130,246,0.28);

      --ok:#00BD83;
      --ok-soft:rgba(0,189,131,0.10);
      --ok-line:rgba(0,189,131,0.26);

      --warn:#E08400;
      --warn-soft:rgba(224,132,0,0.12);
      --warn-line:rgba(224,132,0,0.28);

      --danger:#E04A4A;
      --danger-soft:rgba(224,74,74,0.10);
      --danger-line:rgba(224,74,74,0.26);

      --healing:#7C5BFF;
      --healing-soft:rgba(124,91,255,0.10);
      --healing-line:rgba(124,91,255,0.26);

      --shadow-sm:0 1px 2px rgba(20,18,12,0.04), 0 0 0 1px rgba(20,18,12,0.03);
      --shadow-md:0 6px 18px rgba(20,18,12,0.06), 0 1px 2px rgba(20,18,12,0.04);
      --shadow-lg:0 24px 60px rgba(20,18,12,0.10), 0 2px 6px rgba(20,18,12,0.05);
    }

    /* ─── Dark ─── */
    [data-theme="dark"]{
      --bg-1:#0F1014;
      --bg-2:#16171C;
      --bg-3:#1C1D24;
      --bg-4:#23252E;
      --surface-hover:#1F2028;
      --sidebar-bg:#0B0C10;

      --border:rgba(255,255,255,0.07);
      --border-mid:rgba(255,255,255,0.10);
      --border-strong:rgba(255,255,255,0.16);

      --text:#ECEDF0;
      --text-mute:#9598A3;
      --text-dim:#62646E;
      --text-faint:#3F424A;

      --accent:#6B9FFF;
      --accent-hover:#85B0FF;
      --accent-soft:rgba(107,159,255,0.14);
      --accent-line:rgba(107,159,255,0.32);

      --ok:#5FD39B;
      --ok-soft:rgba(95,211,155,0.13);
      --ok-line:rgba(95,211,155,0.30);

      --warn:#F5C063;
      --warn-soft:rgba(245,192,99,0.13);
      --warn-line:rgba(245,192,99,0.30);

      --danger:#F47A7A;
      --danger-soft:rgba(244,122,122,0.13);
      --danger-line:rgba(244,122,122,0.30);

      --healing:#B891FF;
      --healing-soft:rgba(184,145,255,0.13);
      --healing-line:rgba(184,145,255,0.30);

      --shadow-sm:0 1px 2px rgba(0,0,0,0.25);
      --shadow-md:0 8px 24px rgba(0,0,0,0.35), 0 1px 2px rgba(0,0,0,0.25);
      --shadow-lg:0 24px 60px rgba(0,0,0,0.5);
    }

    /* ─── Tokens shared ─── */
    :root{
      --sans:'Pretendard','Geist',-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',sans-serif;
      --mono:'Geist Mono',ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;

      /* spacing scale (4px base) */
      --s-1:4px;  --s-2:8px;  --s-3:12px; --s-4:16px;
      --s-5:20px; --s-6:24px; --s-7:32px; --s-8:40px;
      --s-9:48px; --s-10:64px; --s-11:80px;

      /* radii */
      --r-1:6px;  --r-2:8px;  --r-3:12px; --r-4:16px; --r-5:20px;

      /* fixed dims */
      --sidebar-w:248px;
      --topbar-h:56px;
      --page-x:var(--s-7);   /* page horizontal padding */
      --page-y:var(--s-6);   /* page vertical padding */
    }

    *,*::before,*::after{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      background:var(--bg-1);
      color:var(--text);
      font-family:var(--sans);
      font-size:13.5px;
      line-height:1.5;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
      letter-spacing:-0.005em;
      overflow:hidden;
      transition:background .2s, color .2s;
    }
    #app{height:100vh;display:flex;overflow:hidden}

    /* scrollbars */
    ::-webkit-scrollbar{width:10px;height:10px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:rgba(120,120,120,0.18);border-radius:8px;border:2px solid transparent;background-clip:content-box}
    ::-webkit-scrollbar-thumb:hover{background:rgba(120,120,120,0.32);background-clip:content-box;border:2px solid transparent}

    .mono{font-family:var(--mono);font-feature-settings:"ss01","cv11"}
    .num{font-variant-numeric:tabular-nums;font-family:var(--mono)}
    .muted{color:var(--text-mute)}
    .dim{color:var(--text-dim)}
    .faint{color:var(--text-faint)}

    .kbd{
      font-family:var(--mono);font-size:11px;
      padding:1px var(--s-2);border-radius:5px;
      background:var(--bg-3);
      border:1px solid var(--border-mid);
      border-bottom-width:2px;color:var(--text-mute);
    }

    /* chips */
    .chip{
      display:inline-flex;align-items:center;gap:var(--s-2);
      padding:3px 9px;border-radius:999px;
      font-size:11.5px;font-weight:500;
      border:1px solid var(--border-mid);
      background:var(--bg-3);color:var(--text-mute);
      line-height:1.3;
    }
    .chip .dot{width:6px;height:6px;border-radius:999px;background:currentColor;flex-shrink:0}
    .chip.ok{color:var(--ok);background:var(--ok-soft);border-color:var(--ok-line)}
    .chip.warn{color:var(--warn);background:var(--warn-soft);border-color:var(--warn-line)}
    .chip.danger{color:var(--danger);background:var(--danger-soft);border-color:var(--danger-line)}
    .chip.healing{color:var(--healing);background:var(--healing-soft);border-color:var(--healing-line)}
    .chip.accent{color:var(--accent);background:var(--accent-soft);border-color:var(--accent-line)}

    /* buttons */
    .btn{
      appearance:none;border:1px solid var(--border-strong);
      background:var(--bg-2);color:var(--text);
      padding:7px 13px;border-radius:var(--r-2);
      font:inherit;font-weight:500;font-size:13px;
      cursor:default;display:inline-flex;align-items:center;gap:var(--s-2);
      transition:background .12s, border-color .12s, transform .04s;
      white-space:nowrap;line-height:1.3;
    }
    .btn:hover{background:var(--surface-hover)}
    .btn:active{transform:translateY(0.5px)}
    .btn.primary{
      background:var(--accent);color:#fff;border-color:var(--accent);
      box-shadow:0 1px 2px rgba(49,130,246,0.18);
    }
    .btn.primary:hover{background:var(--accent-hover);border-color:var(--accent-hover)}
    .btn.ghost{background:transparent;border-color:transparent;color:var(--text-mute)}
    .btn.ghost:hover{color:var(--text);background:var(--bg-3)}
    .btn.danger{color:var(--danger);border-color:var(--danger-line);background:var(--danger-soft)}
    .btn.sm{padding:5px 10px;font-size:12px;border-radius:7px}
    .btn.xs{padding:3px 7px;font-size:11.5px;border-radius:6px}
    .btn.lg{padding:10px 18px;font-size:14px;border-radius:10px}

    /* icons */
    .icon{width:14px;height:14px;flex-shrink:0;stroke:currentColor;stroke-width:1.7;fill:none;stroke-linecap:round;stroke-linejoin:round}
    .icon-lg{width:20px;height:20px;stroke-width:1.6}
    .icon-sm{width:12px;height:12px;stroke-width:1.8}

    /* card */
    .card{
      background:var(--bg-2);
      border:1px solid var(--border);
      border-radius:var(--r-3);
      box-shadow:var(--shadow-sm);
    }
    .card-flat{background:var(--bg-2);border:1px solid var(--border);border-radius:var(--r-3)}

    .divider{height:1px;background:var(--border);margin:0;border:0}

    /* code block */
    .code{
      font-family:var(--mono);font-size:12px;line-height:1.7;
      background:var(--bg-3);
      border:1px solid var(--border);
      border-radius:var(--r-2);
      padding:var(--s-3) var(--s-4);
      color:var(--text);
      overflow-x:auto;
      white-space:pre;
      margin:0;
    }
    .code .tag{color:#0F62D6}
    [data-theme="dark"] .code .tag{color:#9DB8FF}
    .code .attr{color:#C97C00}
    [data-theme="dark"] .code .attr{color:#F5C063}
    .code .str{color:#0E8A56}
    [data-theme="dark"] .code .str{color:#9CDFAE}
    .code .punct{color:var(--text-dim)}
    .code .added{background:var(--ok-soft);color:var(--ok);border-radius:3px;padding:0 3px}
    .code .removed{background:var(--danger-soft);color:var(--danger);border-radius:3px;padding:0 3px;text-decoration:line-through;text-decoration-thickness:1px}
    .code .hl{background:var(--accent-soft);color:var(--accent);border-radius:3px;padding:0 3px}

    /* progress */
    .pbar{position:relative;height:6px;border-radius:999px;background:var(--bg-4);overflow:hidden}
    .pbar > i{display:block;height:100%;border-radius:999px;background:var(--accent);transition:width .3s ease}
    .pbar.thin{height:4px}
    .pbar.tall{height:10px}

    .ticks{display:flex;justify-content:space-between;font-family:var(--mono);font-size:11px;color:var(--text-dim);margin-top:var(--s-2)}

    .row-hover{transition:background .08s}
    .row-hover:hover{background:var(--surface-hover)}

    button:focus,input:focus,a:focus{outline:none}
    a{color:inherit;text-decoration:none}

    h1,h2,h3,h4{margin:0;font-weight:600;letter-spacing:-0.012em}

    .grid{display:grid;gap:var(--s-4)}
    .grid-bg{
      background-image:
        linear-gradient(to right, rgba(120,120,120,0.06) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(120,120,120,0.06) 1px, transparent 1px);
      background-size:24px 24px;
    }
    [data-theme="dark"] .grid-bg{
      background-image:
        linear-gradient(to right, rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255,255,255,0.03) 1px, transparent 1px);
    }

    .ring{transform:rotate(-90deg)}
    input[type=range]{accent-color:var(--accent)}
    ::selection{background:var(--accent-soft);color:var(--text)}

    .fadein{animation:fadein .18s ease-out}
    @keyframes fadein{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

    @keyframes spin{to{transform:rotate(360deg)}}
    .spin{animation:spin 1.1s linear infinite;transform-origin:center}

    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
    .pulse{animation:pulse 1.6s ease-in-out infinite}

    /* friendlier shaded surface section */
    .surface{background:var(--bg-3);border-radius:var(--r-3)}

    /* tweaks panel — adapts to theme */
    [data-theme="dark"] .twk-panel{
      background:rgba(28,29,36,0.92) !important;color:var(--text) !important;
      border:1px solid var(--border-strong) !important;
      box-shadow:var(--shadow-lg) !important;
    }
    [data-theme="dark"] .twk-panel *{color:inherit}
    [data-theme="dark"] .twk-panel .twk-x{color:var(--text-mute) !important}
    [data-theme="dark"] .twk-panel .twk-x:hover{background:rgba(255,255,255,0.08) !important;color:var(--text) !important}
    [data-theme="dark"] .twk-panel .twk-lbl,
    [data-theme="dark"] .twk-panel .twk-sect{color:var(--text-mute) !important}
    [data-theme="dark"] .twk-panel .twk-val{color:var(--text-dim) !important}

    /* segmented (used in approvals chip & detail tabs etc.) */
    .seg{
      display:inline-flex;background:var(--bg-3);border:1px solid var(--border);
      padding:3px;border-radius:10px;gap:2px;
    }
    .seg button{
      appearance:none;border:0;background:transparent;color:var(--text-mute);
      padding:5px 11px;border-radius:7px;font:inherit;font-size:12px;
      font-weight:500;cursor:default;display:inline-flex;align-items:center;gap:6px;
    }
    .seg button.active{background:var(--bg-2);color:var(--text);box-shadow:var(--shadow-sm)}
    [data-theme="dark"] .seg button.active{background:var(--bg-4)}

    /* dot pulse for "live" status */
    .live-dot{position:relative;width:8px;height:8px;border-radius:999px;background:var(--ok);flex-shrink:0}
    .live-dot::after{content:"";position:absolute;inset:-4px;border-radius:999px;border:1.5px solid var(--ok);opacity:.4;animation:pulse 1.6s ease-in-out infinite}
  </style>
</head>
<body>
  <div id="app"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="data.jsx"></script>
  <script type="text/babel" src="screens.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
